name: Update Sport Data

on:
  schedule:
    - cron: "0 */4 * * *"   # toutes les 4 heures
  workflow_dispatch:          # déclenchement manuel possible

jobs:
  generate-and-publish:
    name: Generate events.json and publish to GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate events.json
        run: |
          python backend/export_json.py --days 7 --out backend/output/events.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./backend/output
          keep_files: false
          commit_message: "data: update events.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
